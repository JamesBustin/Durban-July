<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durban July — A Raw-Time Read</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#F3F0E6;
    --paper:#FCFBF6;
    --paper-2:#F1EDE1;
    --ink:#182A20;
    --turf:#1C5137;
    --turf-2:#2C6B4A;
    --claret:#8B2733;
    --claret-deep:#6C1D27;
    --brass:#9C6C26;
    --muted:#6B7365;
    --rail:#D8D3C2;
    --shadow:rgba(24,42,32,.13);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;background:var(--page);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:900px;margin:0 auto;padding:34px 22px 80px;}

  /* Masthead */
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--turf);font-weight:500;margin:0 0 14px;}
  h1.mast{font-family:'Fraunces',serif;font-weight:900;font-optical-sizing:144;
    font-size:clamp(38px,7.2vw,62px);line-height:.98;letter-spacing:-.015em;margin:0 0 16px;}
  h1.mast em{font-style:italic;color:var(--turf);font-weight:600;}
  .standfirst{font-size:16.5px;max-width:62ch;margin:0 0 22px;color:#33413a;}
  .standfirst b{color:var(--ink);font-weight:600;}
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;
    padding:12px 0 4px;border-top:1px solid var(--rail);margin-bottom:26px;}
  .lg{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .swatch{width:11px;height:11px;border-radius:2px;display:inline-block;}
  .swatch.s-claret{background:var(--claret);}
  .swatch.s-brass{background:var(--brass);}

  /* Saddlecloth tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px;}
  .tab{position:relative;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;
    width:46px;height:46px;padding:0;background:var(--paper);color:var(--ink);
    border:1.5px solid var(--rail);border-radius:7px;cursor:pointer;
    transition:transform .14s ease,background .14s ease,color .14s ease,border-color .14s ease;
    display:flex;align-items:center;justify-content:center;}
  .tab:hover{transform:translateY(-2px);border-color:var(--turf-2);}
  .tab.active{background:var(--turf);color:#FCFBF6;border-color:var(--turf);}
  .tab::after{content:"";position:absolute;left:9px;right:9px;bottom:-1.5px;height:3px;
    border-radius:3px;background:transparent;}
  .tab.mark-claret::after{background:var(--claret);}
  .tab.mark-brass::after{background:var(--brass);}
  .tab.active.mark-claret::after,.tab.active.mark-brass::after{bottom:6px;}
  .tab.best{width:auto;padding:0 18px;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;
    background:var(--claret);color:#FCFBF6;border-color:var(--claret);}
  .tab.best.active{background:var(--claret-deep);border-color:var(--claret-deep);}
  .tab.best::after{display:none;}
  .tab:focus-visible{outline:3px solid var(--turf-2);outline-offset:2px;}

  /* Panel */
  .panel{background:var(--paper);border:1px solid var(--rail);border-radius:14px;
    padding:30px 30px 32px;box-shadow:0 18px 44px -30px var(--shadow);
    animation:rise .32s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .r-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--claret);font-weight:600;margin:0 0 6px;}
  .r-title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,4.4vw,33px);
    line-height:1.05;letter-spacing:-.01em;margin:0 0 12px;}
  .r-meta{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);
    margin:0 0 24px;letter-spacing:.02em;}
  .r-meta .sep{color:var(--rail);padding:0 7px;}

  /* Pick banner */
  .pick{border-radius:10px;padding:18px 20px;margin-bottom:26px;position:relative;
    background:var(--paper-2);border-left:5px solid var(--turf);}
  .pick--standout{border-left-color:var(--claret);background:#f6ece9;}
  .pick--value{border-left-color:var(--brass);background:#f4ecda;}
  .flag{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;}
  .flag .rk{color:#fff;background:var(--turf);border-radius:4px;padding:2px 7px;}
  .pick--standout .flag{color:var(--claret-deep);}
  .pick--standout .flag .rk{background:var(--claret);}
  .pick--value .flag{color:#7c5410;}
  .pick--value .flag .rk{background:var(--brass);}
  .pick--plain .flag{color:var(--turf);}
  .pick-horse{font-family:'Fraunces',serif;font-weight:600;font-size:22px;line-height:1.15;margin:0 0 5px;}
  .pick-horse .num{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--muted);font-weight:500;}
  .pick-line{font-size:14.5px;color:#33413a;margin:0;}

  /* Body prose */
  .bp{font-size:15px;margin:0 0 16px;color:#2b3730;}
  .bp strong{color:var(--ink);font-weight:600;}
  .bp em{font-style:italic;}

  /* Labelled note */
  .note{margin:0 0 17px;}
  .note .k{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--turf);font-weight:600;display:block;margin-bottom:3px;}
  .note .v{font-size:15px;color:#2b3730;margin:0;}
  .note .v strong{color:var(--ink);font-weight:600;}
  .nlist{margin:8px 0 0;padding-left:18px;}
  .nlist li{font-size:14.5px;color:#2b3730;margin:0 0 9px;line-height:1.52;}
  .nlist li strong{color:var(--ink);font-weight:600;}
  .note.verdict .k{color:var(--claret);}
  .note.verdict .v{font-weight:500;color:var(--ink);}

  /* Table */
  .tw{overflow-x:auto;margin:0 0 22px;border:1px solid var(--rail);border-radius:10px;}
  table.ftab{width:100%;border-collapse:collapse;font-size:13px;min-width:540px;}
  .ftab th{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--turf);text-align:left;padding:10px 12px;
    background:var(--paper-2);border-bottom:1.5px solid var(--turf);white-space:nowrap;}
  .ftab td{padding:9px 12px;border-bottom:1px solid var(--rail);vertical-align:top;color:#3a463f;}
  .ftab tbody tr:last-child td{border-bottom:none;}
  .ftab tbody tr:nth-child(even){background:rgba(28,81,55,.03);}
  .c-horse{font-weight:600;color:var(--ink);white-space:nowrap;}
  .c-mono{font-family:'IBM Plex Mono',monospace;white-space:nowrap;color:var(--ink);font-size:12px;}
  .c-fig{font-family:'IBM Plex Mono',monospace;color:var(--ink);font-size:12px;line-height:1.45;min-width:150px;}
  .c-equiv{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--turf);font-size:12.5px;line-height:1.4;}
  .c-note{color:#4a5650;min-width:210px;line-height:1.45;}

  /* Fades + aside */
  .fades{border-top:1px solid var(--rail);padding-top:15px;margin-top:22px;}
  .fades .k{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--claret);font-weight:600;display:block;margin-bottom:3px;}
  .fades .v{font-size:13.5px;color:var(--muted);margin:0;line-height:1.5;}
  .fades .v strong{color:#3a463f;font-weight:600;}
  .aside{background:var(--paper-2);border-left:4px solid var(--brass);border-radius:8px;
    padding:14px 17px;margin:24px 0 4px;}
  .aside .k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.13em;
    text-transform:uppercase;color:#7c5410;font-weight:600;display:block;margin-bottom:4px;}
  .aside .v{font-size:13.5px;color:#4a5044;margin:0;font-style:italic;line-height:1.55;}

  /* Best bets */
  .bb-intro{font-family:'Fraunces',serif;font-style:italic;font-size:19px;color:var(--turf);
    margin:0 0 24px;max-width:54ch;line-height:1.35;}
  .rank{display:flex;gap:18px;align-items:baseline;padding:16px 0;border-top:1px solid var(--rail);}
  .rank:first-of-type{border-top:none;}
  .rank .no{font-family:'Fraunces',serif;font-weight:900;font-size:40px;line-height:1;
    color:var(--claret);min-width:44px;font-optical-sizing:144;}
  .rank--next .no{color:var(--muted);}
  .rank .body{flex:1;}
  .rank .hn{font-family:'Fraunces',serif;font-weight:600;font-size:20px;margin:0 0 3px;}
  .rank .rc{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;background:var(--turf);border-radius:4px;padding:2px 8px;
    display:inline-block;margin-left:8px;vertical-align:middle;font-weight:500;}
  .rank .why{font-size:14.5px;color:#33413a;margin:5px 0 0;}
  .subhead{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--claret);font-weight:600;margin:32px 0 6px;
    padding-top:20px;border-top:2px solid var(--claret);}
  .subhead.brass{color:var(--brass);border-top-color:var(--brass);}
  .subnote{font-size:13.5px;color:var(--muted);margin:0 0 8px;font-style:italic;}
  .angles{display:flex;flex-direction:column;gap:14px;margin-top:14px;}
  .angle{display:flex;gap:14px;align-items:baseline;}
  .angle .dot{width:10px;height:10px;border-radius:50%;background:var(--brass);margin-top:6px;flex:none;}
  .angle .an{font-family:'Fraunces',serif;font-weight:600;font-size:17px;margin:0;}
  .angle .rc{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;
    color:var(--brass);text-transform:uppercase;font-weight:600;margin-left:6px;}
  .angle .aw{font-size:14px;color:#33413a;margin:3px 0 0;}
  .method-strip{margin-top:34px;padding:18px 20px;background:var(--paper-2);border-radius:10px;
    font-size:13.5px;color:#33413a;}
  .method-strip b{color:var(--turf);font-weight:600;}

  footer{margin-top:34px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    letter-spacing:.06em;color:var(--muted);text-align:center;}

  @media (max-width:560px){
    .panel{padding:22px 18px 26px;}
    .pick{padding:15px 16px;}
    .rank .no{font-size:32px;min-width:36px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker">Greyville · Raw-Time Method · 12 Races</p>
    <h1 class="mast">Durban July,<br><em>on the clock.</em></h1>
    <div class="legend">
      <span class="lg"><span class="swatch s-claret"></span> Standout bet</span>
      <span class="lg"><span class="swatch s-brass"></span> Method-value angle</span>
      <span class="lg">Surface (D-turf / G-poly) unconfirmed on most races</span>
    </div>
  </header>

  <nav class="tabs" id="tabs" aria-label="Choose a race"></nav>
  <main id="panel" class="panel" role="region" aria-live="polite"></main>
  <footer>Working document · picks are analysis, not advice · form read from raw times</footer>
</div>

<script>
/* Body blocks:
   {t:'p', h}                  paragraph
   {t:'lp', k, h}              labelled paragraph (mono label + text)
   {t:'vp', k:'Verdict', h}    verdict (claret label, emphasised)
   {t:'table', head:[], rows:[[]], cls:[]}
   {t:'fades', h}
   {t:'aside', h}              "vs the handoff" note
*/
const races = [
  { no:1, mark:null,
    title:"Class 4 (BM82), 1600m",
    meta:["1600m","Class 4 (BM82)","Greyville","par 97.0"],
    pick:{variant:"plain", flag:"The constant", horse:"Hoodia", num:"(13)",
      line:"The surface-robust each-way angle — a light 57.0kg sprinter with the stamina note to step up to the mile."},
    body:[
      {t:'p', h:`Switching to raw time (not the guide's ADJ/TM) means comparing like-for-like or not at all: only times from the same course code and distance get ranked, and cross-track times are noted, never ranked. Par time still stands (the header's 97:0). Every past time is projected to today's carried weight at ≈0.1s/kg.`},
      {t:'p', h:`Here's every credible 1600m line, weight-adjusted to today, grouped by surface so nothing gets mixed:`},
      {t:'table',
        head:["Horse","Wt today","Surface","Best 1600m raw (wt that day)","→ today-equiv","Note"],
        cls:["c-horse","c-mono","c-mono","c-mono","c-mono","c-note"],
        rows:[
          ["PLACE OF PRACTICE (3)","59.0","G poly","95.4 (60.0)","95.30","fastest raw — but a maiden-plate win, big class rise"],
          ["TOWN CRIER (2)","60.0","G poly","96.0 (57.0)","96.30","won this C&D, +3kg today"],
          ["MAGMA MAGIC (11)","61.0","D turf","95.6 (56.0)","96.10","won on turf; also 96.4 equiv on poly but beaten there"],
          ["MAGMA MAGIC (11)","61.0","G poly","96.0 (57.0, 4th)","96.40","poly run was “no extra”"],
          ["DYLAN'S CHAMP (7)","61.0","D turf","97.8 (56.0, 8th)","98.30","top weight kills it"],
          ["SOMMERSTERN (10)","60.5","E (E. London)","97.2 (58.5)","97.40","won — but different track, raider, 0 KZN prep"],
          ["MASTER BOMBER (14)","57.0","E","96.2 (57.0)","96.20","fast & light — but E track, no recent KZN run"]
        ]},
      {t:'lp', k:"What raw time changes", h:`<strong>PLACE OF PRACTICE (3) forces its way in.</strong> On the clock it's the fastest poly 1600m in the field (95.3 equiv, gun-to-tape, at today's weight). The catch is real: that was maiden-plate grade into Class 4 — a genuine class jump. Raw time loves it; class says respect-but-caution.`},
      {t:'lp', k:"Hoodia, reframed", h:`Its fast 1600m times were all Kenilworth/L (99–105s) — not comparable to Greyville, so they can't be ranked. Its only KZN evidence is the recent G 1400m in 82:6 off 57kg, “running on at finish.” So Hoodia is a light-weight (57kg) sprinter stepping up, with the stamina note backing the trip — a live each-way play on the “ran on → step up” rule. DUBAI DUDE (12) is the same story but weaker: blazing 1400m poly (81:6, won), front-running, unproven at 1600m, wide draw — a watch. TOWN CRIER and MAGMA MAGIC hold up as the two solid, proven-at-the-mile runners.`},
      {t:'lp', k:"The surface decides it", h:`<strong>If turf (D):</strong> MAGMA MAGIC (11) is the only horse with a credible turf 1600m win on the clock (96.10 equiv). Top pick despite 61kg; Town Crier has no turf-mile line, Place of Practice's fast time was poly. <strong>If poly (G):</strong> PLACE OF PRACTICE (3) is fastest on raw time (95.30, class caveat) → TOWN CRIER (2) 96.30 (real C&D win) → MAGMA MAGIC (a beaten 4th on the poly).`},
      {t:'vp', k:"Verdict", h:`Turf → MAGMA MAGIC (11) on top; poly → TOWN CRIER (2) on top with PLACE OF PRACTICE (3) the fast-time danger. HOODIA (13) is the each-way angle on either surface, MASTER BOMBER (14) the East-London-time saver if you'll forgive no KZN prep.`},
      {t:'fades', h:`WORLD ORDER (4, Highveld raider + poor form), UNITED FRONT (9, raider + respiratory history + 10-wk rest), NOTABLE (6, dreadful recent form), STAR OF THE FUTURE (15, wants 2000m — 1600m too sharp), IBUTHO (1, 8yo, two “never dangerous”). Raiders without KZN prep: SONG TO THE MOON (8), SOMMERSTERN (10).`}
    ]
  },

  { no:2, mark:"claret",
    title:"Tote B Stakes (open)",
    meta:["1600m","Open","Greyville","par 97.0"],
    pick:{variant:"standout", flag:"Standout", rk:"#7", horse:"World Of Our Own", num:"(7)",
      line:"Fastest weight-adjusted mile in the field on either surface, surface-robust, MR rocketing 77→88."},
    body:[
      {t:'p', h:`Open-company mile, 13 runners (Deception Pass 13 scratched). The market is built around PLEASE BE TRUE (3) at 2/1 — and that's the first thing the method throws out. He's an all-Cape horse (K-form only), zero Greyville starts, C&D 0:0-0-0. Textbook raider fade of the favourite. Meanwhile the fastest genuine Greyville miler in the race is being offered at 10s.`},
      {t:'p', h:`Weight-adjusted 1600m times at 0.1s/kg, ranked within surface:`},
      {t:'table',
        head:["Horse","Wt today","Surface","Best 1600m raw (wt that day)","→ Today-equiv","Note"],
        cls:["c-horse","c-mono","c-mono","c-fig","c-equiv","c-note"],
        rows:[
          ["WORLD OF OUR OWN (7)","57.0","G poly","95.1 (58.0)","94.90","fastest poly raw; also D-1600 96.0 (57.0)→96.00. Surface-robust"],
          ["WORLD OF OUR OWN (7)","57.0","D turf","96.0 (57.0)","96.00","has an actual turf line too — rare in this field"],
          ["IMPERIAL POWER (11)","57.0","G poly","94.8 (53.0, won)","95.20","won G-1600 off light 53.0; today +4kg. 10-wk break"],
          ["SUNDANCE KID (12)","61.5","G poly","95.3 (57.5)","95.25","fast, but top weight 61.5 adds nothing back — perennial placer"],
          ["ROYAL SWORD (8)","57.0","G poly","95.1 (60.5)","94.75","3rd to WOOO here; carried 60.5 that day so drops 3.5kg → big"],
          ["GRAND OCCASION (4)","56.0","G poly","95.7 (55.5, won)","95.75","front-runner, well-in at 56; Cls4F→open a class rise"],
          ["GREEN GLOW (6)","57.0","G poly","95.7 (57.0)","95.70","dual Greyville form, improving"],
          ["PLEASE BE TRUE (3)","58.5","—","n/a (all K-form, 0 Greyville)","—","2/1 fav, raider fade"]
        ]},
      {t:'p', h:`<strong>WORLD OF OUR OWN (7)</strong> is the method pick and it's clean: he clocks the fastest weight-adjusted 1600m in the field on either surface (G ~94.90 adj, D 96.0 adj — both under par), has 6 C&D runs with two wins, a strongly rising MR (77→88), sits well at 57.0kg, and the guide itself says “should have finished closer last time, include.” Surface-robust, which is exactly what you want when the header won't confirm the strip.`},
      {t:'p', h:`Behind him it splits on surface. <strong>If poly (G):</strong> IMPERIAL POWER (11), SUNDANCE KID (12), GRAND OCCASION (4) and GREEN GLOW (6) all get a lift — Grand Occasion in particular is dangerous on the lead if it's poly, fast G-1600 times and 6kg-type well-in. <strong>If turf (D):</strong> World Of Our Own still tops (he has the D-run), Sundance Kid/Imperial Power's edge softens, and CAPSAICIN (10) and DIANI (9) come marginally into it on their turf/mixed form.`},
      {t:'vp', k:"Verdict", h:`WORLD OF OUR OWN (7) → IMPERIAL POWER (11) → SUNDANCE KID (12), with ROYAL SWORD (8) and GREEN GLOW (6) each-way, and GRAND OCCASION (4) a live poly saver.`},
      {t:'lp', k:"Pace note", h:`Grand Occasion, Capsaicin and Sundance Kid all want to lead — a genuine tempo suits the closer (World Of Our Own) even more.`},
      {t:'fades', h:`PLEASE BE TRUE (3) — the 2/1 favourite, all-Cape, no Greyville, C&D 0:0-0-0, the signature take-on. OPEN HIGHWAY (1) — Highveld/variant (J/T/V/Y), altitude-flattered clock, minimal coastal form. STATUS (14) — all-Highveld, MR75, 15-wk break, stable debut. BRUH (5) — 13-wk break, no recent run, modest D-1600 form. DIANI (9) — honest 6yo but best at 1400m, minor at 1600m/60kg.`}
    ]
  },

  { no:3, mark:"brass",
    title:"Grade 3 Magical Zulu Kingdom 2200",
    meta:["2200m","Grade 3 · AMR-101","Greyville (D-turf)","par 137.6"],
    pick:{variant:"value", flag:"Method-value", horse:"Imilenzeyokududuma", num:"(5)",
      line:"In-form KZN stayer dropping 2400→2200 with stamina in hand — the closer in a truly-run race."},
    body:[
      {t:'lp', k:"Surface confirm", h:`the two genuine 2200m clocks in the field (Otto Luyken's win, Johnny the Thief) are both D-coded (Greyville turf), par 137:6 fits turf, and this is run on the July course — so I'm treating it as D-turf with high confidence. Unlike some races it doesn't move anything: the horses I care about all have turf lines.`},
      {t:'p', h:`The whole race turns on one fact the method cares about more than anything else: only two runners have ever clocked a real Greyville 2200m — and they ran it in the same race. On 25.07.05 (D-2200), OTTO LUYKEN won it in 136:8 off 61.0kg; JOHNNY THE THIEF was 4th, 2.4L back, in 137:3 off 52.5kg. Weight-adjusted to today: Otto Luyken 136.85 (sub-par by ~0.75s), Johnny the Thief ~137.25 (par). Everyone else's stamina and time at the trip is inferred from adjacent distances.`},
      {t:'p', h:`By rating (AMR 101) the class shortlist is Otto Luyken 113 · Magic Verse 111 · Field Marshal 110 · Imilenzeyokududuma 109 · Tenpenny 107 · La Pulga 105 — and the handicap is tight and rating-consistent, so none of the light-weights are “well-in,” they're just lower-rated.`},
      {t:'table',
        head:["Horse","Wt today","Surface","Best relevant raw (wt that day)","→ Today-equiv","Note"],
        cls:["c-horse","c-mono","c-mono","c-fig","c-equiv","c-note"],
        rows:[
          ["OTTO LUYKEN (12)","61.5","D turf 2200","136.8 (61.0, won)","136.85","only sub-par winning exact-C&D clock; 52 wks old; “tired late” recently"],
          ["JOHNNY THE THIEF (1)","52.0","D turf 2200","137.3 (52.5, 4th)","137.25","the only other real 2200 clock; was 2.4L behind Otto that day; MR94"],
          ["IMILENZEYOKUDUDUMA (5)","59.5","D turf 2400","153.5 (57.0, 2nd “running on”)","153.75 (2400)","best current form; drops to 2200 w/ stamina in hand; no same-dist 2200 clock"],

const valueAngles = [

];

const tabs = document.getElementById('tabs');
const panel = document.getElementById('panel');

races.forEach(r=>{
  const b=document.createElement('button');
  b.className='tab'+(r.mark?(' mark-'+r.mark):'');
  b.textContent=r.no;
  b.setAttribute('aria-label','Race '+r.no);
  b.dataset.race=r.no;
  b.addEventListener('click',()=>select(r.no));
  tabs.appendChild(b);
});
const bb=document.createElement('button');
bb.className='tab best';
bb.textContent='Best Bets';
bb.dataset.race='best';
bb.addEventListener('click',()=>select('best'));
tabs.appendChild(bb);

function setActive(key){
  document.querySelectorAll('.tab').forEach(t=>{
    const on=t.dataset.race===String(key);
    t.classList.toggle('active',on);
    t.setAttribute('aria-pressed',on);
  });
}

function renderBody(blocks){
  return blocks.map(b=>{
    if(b.t==='p') return `<p class="bp">${b.h}</p>`;
    if(b.t==='lp') return `<div class="note"><span class="k">${b.k}</span><p class="v">${b.h}</p></div>`;
    if(b.t==='vp') return `<div class="note verdict"><span class="k">${b.k}</span><p class="v">${b.h}</p></div>`;
    if(b.t==='ul') return `<div class="note"><span class="k">${b.k}</span>${b.intro?`<p class="v" style="margin-bottom:6px">${b.intro}</p>`:''}<ul class="nlist">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    if(b.t==='fades') return `<div class="fades"><span class="k">Fades</span><p class="v">${b.h}</p></div>`;
    if(b.t==='aside') return `<div class="aside"><span class="k">vs the handoff</span><p class="v">${b.h}</p></div>`;
    if(b.t==='table'){
      const head=b.head.map(h=>`<th>${h}</th>`).join('');
      const rows=b.rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${b.cls?b.cls[i]:''}">${c}</td>`).join('')}</tr>`).join('');
      return `<div class="tw"><table class="ftab"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    return '';
  }).join('');
}

function renderRace(r){
  const p=r.pick;
  const flag=`<div class="flag">${p.rk?`<span class="rk">${p.rk}</span>`:''}${p.flag}</div>`;
  const meta=r.meta.map(m=>`<span>${m}</span>`).join('<span class="sep">/</span>');
  return `
    <p class="r-eyebrow">Race ${r.no}</p>
    <h2 class="r-title">${r.title}</h2>
    <p class="r-meta">${meta}</p>
    <div class="pick pick--${p.variant}">
      ${flag}
      <p class="pick-horse">${p.horse} <span class="num">${p.num}</span></p>
      <p class="pick-line">${p.line}</p>
    </div>
    ${renderBody(r.body)}
  `;
}

function renderBest(){
  const rows=bestBets.map(b=>`
    <div class="rank"><div class="no">${b.no}</div>
    <div class="body"><p class="hn">${b.horse}<span class="rc">${b.race}</span></p><p class="why">${b.why}</p></div></div>`).join('');
  const dropped=droppedBets.map(b=>`
    <div class="rank rank--next"><div class="no">${b.no}</div>
    <div class="body"><p class="hn">${b.horse}<span class="rc">${b.race}</span></p><p class="why">${b.why}</p></div></div>`).join('');
  const angles=valueAngles.map(a=>`
    <div class="angle"><span class="dot"></span>
    <div><p class="an">${a.horse}<span class="rc">${a.race}</span></p><p class="aw">${a.why}</p></div></div>`).join('');
  return `
    <p class="r-eyebrow">The Card, Ranked</p>
    <h2 class="r-title">Best Bets</h2>
    <p class="bb-intro">Five to stand on, in confidence order — then two that held a place in an earlier five and slipped just outside in the re-work.</p>
    ${rows}
    <p class="subhead">Dropped from the five in the re-work</p>
    <p class="subnote">Still strong — numbered on where they now sit.</p>
    ${dropped}
    <p class="subhead brass">Method-value angles — worth more than their price</p>
    ${angles}
    <div class="method-strip">The thread across the whole card: the market keeps floating <b>Turffontein and Kenilworth raiders</b> on fast-looking raw times. Read on a consistent track, weight-adjusted, the value sits heavily with the KZN-prepped locals.</div>
  `;
}

function select(key){
  setActive(key);
  panel.classList.remove('panel');void panel.offsetWidth;panel.classList.add('panel');
  if(key==='best'){panel.innerHTML=renderBest();}
  else{panel.innerHTML=renderRace(races.find(r=>r.no===Number(key)));}
}

select('best');
</script>
